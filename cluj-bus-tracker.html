<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cluj Bus Tracker</title>
<meta name="description" content="Real-time bus tracker for Cluj-Napoca">
<meta name="theme-color" content="#f5a623">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #1a1d26;
    --border: #252836;
    --accent: #f5a623;
    --accent2: #e8395a;
    --text: #e8eaf2;
    --text-dim: #6b7080;
    --green: #2ef08e;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    padding-top: max(12px, var(--safe-top));
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 1000;
    flex-shrink: 0;
  }

  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-icon {
    width: 30px; height: 30px;
    background: var(--accent);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .logo-text { font-family: var(--sans); font-weight: 800; font-size: 16px; letter-spacing: -0.5px; }
  .logo-text span { color: var(--accent); }

  .status-pill {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 11px; color: var(--text-dim);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 100px; padding: 4px 10px; margin-left: auto;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-dim); transition: background 0.3s;
  }
  .status-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
  .status-dot.error { background: var(--accent2); }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .bus-count {
    font-family: var(--mono); font-size: 11px; color: var(--text-dim);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 100px; padding: 4px 10px;
  }
  .bus-count strong { color: var(--accent); }

  /* ── LAYOUT ── */
  .app-body { display: flex; flex: 1; overflow: hidden; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 300px; flex-shrink: 0;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }

  .sidebar-section { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .sidebar-label {
    font-family: var(--mono); font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px;
  }

  .api-form { display: flex; flex-direction: column; gap: 6px; }
  .api-input-wrap { display: flex; gap: 6px; }

  input[type="text"] {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-family: var(--mono);
    font-size: 12px; padding: 10px; outline: none; transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--text-dim); }

  .btn {
    background: var(--accent); color: #000; border: none;
    border-radius: 6px; font-family: var(--sans); font-weight: 700;
    font-size: 13px; padding: 10px 14px; cursor: pointer;
    transition: opacity 0.2s; white-space: nowrap; touch-action: manipulation;
  }
  .btn:active { opacity: 0.75; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-sm {
    background: var(--surface2); color: var(--text-dim);
    border: 1px solid var(--border); border-radius: 6px;
    font-family: var(--mono); font-size: 11px; padding: 8px 12px;
    cursor: pointer; touch-action: manipulation;
  }
  .btn-sm:active { color: var(--accent); border-color: var(--accent); }

  .api-hint {
    font-family: var(--mono); font-size: 10px; color: var(--text-dim); line-height: 1.5;
  }
  .api-hint a { color: var(--accent); text-decoration: none; }

  .filter-wrap { display: flex; gap: 6px; }
  #routeFilter { flex: 1; }

  /* BUS LIST */
  .bus-list { flex: 1; overflow-y: auto; padding: 6px; -webkit-overflow-scrolling: touch; }
  .bus-list::-webkit-scrollbar { width: 3px; }
  .bus-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .bus-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px; border-radius: 8px; cursor: pointer;
    border: 1px solid transparent; transition: background 0.15s;
  }
  .bus-item:active { background: var(--surface2); }
  .bus-item.active { background: var(--surface2); border-color: var(--accent); }

  .bus-badge {
    width: 36px; height: 22px; border-radius: 5px;
    background: var(--accent); color: #000;
    font-family: var(--mono); font-weight: 700; font-size: 11px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .bus-info { flex: 1; min-width: 0; }
  .bus-label { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bus-meta { font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .bus-speed { font-family: var(--mono); font-size: 10px; color: var(--text-dim); text-align: right; flex-shrink: 0; }

  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; gap: 10px;
    padding: 30px 16px; text-align: center;
  }
  .empty-icon { font-size: 40px; opacity: 0.3; }
  .empty-text { font-family: var(--mono); font-size: 11px; color: var(--text-dim); line-height: 1.6; }

  .error-banner {
    font-family: var(--mono); font-size: 10px; color: var(--accent2);
    background: rgba(232,57,90,.1); border: 1px solid rgba(232,57,90,.3);
    border-radius: 6px; padding: 8px 10px; margin-top: 6px;
    display: none; word-break: break-word; line-height: 1.5;
  }

  /* ── MAP ── */
  #map { flex: 1; z-index: 1; position: relative; }

  /* LOCATE BUTTON */
  .locate-btn {
    position: absolute;
    bottom: 24px; right: 12px;
    z-index: 1000;
    width: 46px; height: 46px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; cursor: pointer;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    touch-action: manipulation;
    transition: border-color 0.2s;
  }
  .locate-btn:active { opacity: 0.7; }
  .locate-btn.active { border-color: #4285f4; }
  .leaflet-tile-pane { filter: brightness(0.7) saturate(0.6) hue-rotate(200deg); }
  .leaflet-popup-content-wrapper {
    background: var(--surface2) !important; border: 1px solid var(--border) !important;
    border-radius: 10px !important; color: var(--text) !important;
    box-shadow: 0 8px 32px rgba(0,0,0,.6) !important; font-family: var(--sans) !important;
  }
  .leaflet-popup-tip { background: var(--surface2) !important; }
  .leaflet-popup-close-button { color: var(--text-dim) !important; font-size: 18px !important; padding: 8px !important; }
  .popup-route { font-weight: 800; font-size: 18px; color: var(--accent); margin-bottom: 4px; }
  .popup-label { font-size: 12px; color: var(--text); margin-bottom: 6px; }
  .popup-meta { font-family: var(--mono); font-size: 10px; color: var(--text-dim); line-height: 1.8; }
  .popup-meta span { color: var(--green); }

  /* ── UPDATE BAR ── */
  .update-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 14px; background: var(--surface); border-top: 1px solid var(--border);
    font-family: var(--mono); font-size: 10px; color: var(--text-dim); flex-shrink: 0;
  }
  .update-bar .countdown { color: var(--accent); }
  .progress-bar { height: 2px; background: var(--border); flex-shrink: 0; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.5s linear; }

  /* ── MOBILE LAYOUT ── */
  @media (max-width: 768px) {
    .app-body { flex-direction: column; }

    .sidebar {
      width: 100%;
      flex-shrink: 0;
      border-right: none;
      border-bottom: 1px solid var(--border);
      max-height: 44vh;
    }

    /* Hide the hint text on mobile to save space */
    .api-hint { display: none; }

    /* Make the bus list scrollable within the panel */
    .bus-list { max-height: 130px; }

    /* Map fills remaining space */
    #map { flex: 1; min-height: 0; }

    /* Larger touch targets */
    .btn, .btn-sm, input[type="text"] { min-height: 44px; font-size: 14px; }
    .bus-item { padding: 12px 10px; }
    .bus-badge { width: 42px; height: 26px; font-size: 12px; }
    .bus-label { font-size: 14px; }

    /* Safe area padding at bottom */
    .update-bar { padding-bottom: max(6px, var(--safe-bottom)); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🚌</div>
    <div class="logo-text">Cluj-<span>Napoca</span></div>
  </div>
  <div class="bus-count" id="busCountBadge">— buses</div>
  <div class="status-pill">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">offline</span>
  </div>
</header>

<div class="app-body">
  <div class="sidebar">

    <div class="error-banner" id="errorBanner" style="margin:10px 14px;display:none"></div>

    <div class="sidebar-section">
      <div class="sidebar-label">Filter by route</div>
      <div class="filter-wrap">
        <input type="text" id="routeFilter" placeholder="e.g. 30, M1…" oninput="applyFilter()" inputmode="text"/>
        <button class="btn-sm" onclick="clearFilter()">Clear</button>
      </div>
    </div>

    <div class="bus-list" id="busList">
      <div class="empty-state">
        <div class="empty-icon">🚌</div>
        <div class="empty-text">Enter your API key above<br>to see live buses</div>
      </div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="update-bar">
      <span id="lastUpdate">—</span>
      <span>GPS <span class="countdown" id="countdown">—</span></span>
    </div>
  </div>

  <div id="map">
    <button class="locate-btn" id="locateBtn" onclick="toggleLocate()">📍</button>
  </div>
</div>

<script>
const AGENCY_ID = 2;
const API_BASE  = 'https://api.tranzy.ai/v1/opendata/';
const REFRESH_INTERVAL = 20000;
const CLUJ_CENTER = [46.7712, 23.6236];


let apiKey = 'PyzKfV3MncBFqRrN8cQQ0LdMpvPG2EepYPtoewPE';
let vehicles = [];
let routes   = {};
let trips    = {};
let markers  = {};
let selectedId = null;
let refreshTimer = null;
let countdownTimer = null;
let countdownVal = 0;
let filterText = '';
let shapesCache = null;
let routeLines  = [];
let vehicleStates = {}; // interpolation state per vehicle
let lastGpsTimestamp = null; // most recent GPS timestamp from vehicles

const map = L.map('map', { zoomControl: true, attributionControl: true }).setView(CLUJ_CENTER, 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom: 19
}).addTo(map);

function makeBusIcon(routeName, color, heading) {
  const label = routeName || '?';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="44" height="52" viewBox="0 0 44 52">
    <defs><filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter></defs>
    <rect x="2" y="2" width="40" height="36" rx="8" fill="${color}" filter="url(#sh)"/>
    <polygon points="22,52 14,38 30,38" fill="${color}"/>
    <text x="22" y="23" text-anchor="middle" dominant-baseline="central"
      font-family="Space Mono,monospace" font-size="${label.length > 2 ? 11 : 13}" font-weight="700"
      fill="#000">${label}</text>
  </svg>`;
  return L.divIcon({
    html: `<div style="transform:rotate(${heading || 0}deg)">${svg}</div>`,
    className: '', iconSize: [44, 52], iconAnchor: [22, 52], popupAnchor: [0, -52]
  });
}

function routeColor(name) {
  const colors = ['#f5a623','#2ef08e','#5bc8ff','#fc7a7a','#bf9fff','#ffd166','#06d6a0'];
  let h = 0;
  for (const c of String(name)) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return colors[h % colors.length];
}

async function apiGet(endpoint) {
  let res;
  try {
    res = await fetch(API_BASE + endpoint, {
      headers: { 'X-API-KEY': apiKey.trim(), 'X-Agency-Id': String(AGENCY_ID) }
    });
  } catch (e) {
    throw new Error(`Network error — ${e.message}`);
  }
  if (!res.ok) {
    const body = await res.text().catch(() => '');
    throw new Error(`API ${res.status}: ${body.slice(0, 120)}`);
  }
  return res.json();
}

async function fetchRoutes() {
  const data = await apiGet('routes');
  routes = {};
  for (const r of data) routes[r.route_id] = r;
}

async function fetchTrips() {
  const data = await apiGet('trips');
  trips = {};
  for (const t of data) {
    if (!trips[t.route_id]) trips[t.route_id] = [];
    if (!trips[t.route_id].includes(t.shape_id)) trips[t.route_id].push(t.shape_id);
  }
}

async function loadShapes() {
  if (shapesCache) return shapesCache;
  const data = await apiGet('shapes');
  shapesCache = {};
  for (const s of data) {
    if (!shapesCache[s.shape_id]) shapesCache[s.shape_id] = [];
    shapesCache[s.shape_id].push(s);
  }
  for (const id of Object.keys(shapesCache))
    shapesCache[id].sort((a, b) => a.shape_pt_sequence - b.shape_pt_sequence);
  return shapesCache;
}

function clearRouteLines() {
  for (const l of routeLines) map.removeLayer(l);
  routeLines = [];
}

async function drawRoute(routeId, color) {
  clearRouteLines();
  const shapeIds = trips[routeId] || [];
  if (!shapeIds.length) return;
  const shapes = await loadShapes();
  shapeIds.forEach((sid, i) => {
    const pts = shapes[sid];
    if (!pts) return;
    const line = L.polyline(pts.map(p => [p.shape_pt_lat, p.shape_pt_lon]), {
      color, weight: 5, opacity: i === 0 ? 0.85 : 0.5, smoothFactor: 1
    }).addTo(map);
    routeLines.push(line);
  });
}

let animationStarted = false;

async function connect() {
  setStatus('connecting', 'connecting…');
  hideError();
  try {
    await fetchRoutes();
    await fetchTrips();
    await refresh();
    startAutoRefresh();
    if (!animationStarted) { animationStarted = true; animateVehicles(); }
  } catch(e) {
    showError(e.message.includes('401') ? 'Invalid API key.' : e.message);
    setStatus('error', 'error');
  }
}

async function refresh() {
  try {
    vehicles = await apiGet('vehicles');
    lastGpsTimestamp = Date.now();
    updateMap(); updateList();
    setStatus('live', 'live');
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
    updateGpsAge();
    hideError();
  } catch(e) {
    showError(e.message); setStatus('error', 'error');
  }
}

function startAutoRefresh() {
  clearInterval(refreshTimer); clearInterval(countdownTimer);
  refreshTimer = setInterval(refresh, REFRESH_INTERVAL);
  startGpsAgeTimer();
}

function startGpsAgeTimer() {
  clearInterval(countdownTimer);
  countdownTimer = setInterval(updateGpsAge, 1000);
}

function updateGpsAge() {
  if (!lastGpsTimestamp) return;
  const ageMs = Date.now() - lastGpsTimestamp;
  const ageSec = Math.round(ageMs / 1000);
  const txt = ageSec < 60 ? `${ageSec}s ago` : `${Math.floor(ageSec/60)}m ${ageSec%60}s ago`;
  document.getElementById('countdown').textContent = txt;
  // progress bar fills as data gets older (resets at 20s)
  const pct = Math.min((ageSec / 20) * 100, 100);
  document.getElementById('progressFill').style.width = pct + '%';
}

// ── DEPOTS (geofence – buses inside are hidden) ──
const DEPOTS = [
  { name: 'Disp. Bucium',  lat: 46.751340,          lng: 23.542472,          r: 200 },
  { name: 'Disp. Zorilor', lat: 46.751027159966924, lng: 23.577842451359132, r: 200 },
  { name: 'Depot 3',      lat: 46.76482740185565,  lng: 23.548790354533462, r: 200 },
  { name: 'Depot 4',      lat: 46.76626698390244,  lng: 23.63213713086105,  r: 200 },
  { name: 'Depot 5',      lat: 46.78584698076447,  lng: 23.628439445804574, r: 200 },
];

function distMeters(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function isInDepot(lat, lng) {
  return DEPOTS.some(d => distMeters(lat, lng, d.lat, d.lng) <= d.r);
}

function filteredVehicles() {
  let result = vehicles.filter(v => !isInDepot(v.latitude, v.longitude));
  if (!filterText) return result;
  return result.filter(v => {
    const r = routes[v.route_id];
    const label = r ? (r.route_short_name || r.route_long_name || '') : String(v.route_id);
    return label.toLowerCase().includes(filterText.toLowerCase());
  });
}

function updateMap() {
  const fv = filteredVehicles();
  const seen = new Set();
  const now = Date.now();
  for (const v of fv) {
    if (!v.latitude || !v.longitude) continue;
    const id = v.id; seen.add(String(id));
    const r = routes[v.route_id];
    const routeName = r ? (r.route_short_name || r.route_long_name || '?') : String(v.route_id || '?');
    const color = routeColor(routeName);
    const icon = makeBusIcon(routeName, color, v.bearing || 0);

    // Set up interpolation state
    const prev = vehicleStates[id];
    vehicleStates[id] = {
      fromLat: prev ? prev.currentLat : v.latitude,
      fromLng: prev ? prev.currentLng : v.longitude,
      toLat: v.latitude,
      toLng: v.longitude,
      currentLat: prev ? prev.currentLat : v.latitude,
      currentLng: prev ? prev.currentLng : v.longitude,
      updateTime: now
    };

    if (markers[id]) {
      markers[id].setIcon(icon);
      markers[id]._routeName = routeName; markers[id]._vdata = v;
    } else {
      const m = L.marker([v.latitude, v.longitude], { icon })
        .addTo(map).on('click', () => selectBus(id));
      m._routeName = routeName; m._vdata = v; markers[id] = m;
    }
    if (markers[id].isPopupOpen())
      markers[id].setPopupContent(makePopupHtml(v, routeName, color));
  }
  for (const id of Object.keys(markers)) {
    if (!seen.has(String(id))) {
      map.removeLayer(markers[id]); delete markers[id]; delete vehicleStates[id];
    }
  }
  document.getElementById('busCountBadge').innerHTML = `<strong>${fv.length}</strong> buses`;
}

// Smooth animation loop — runs every 100ms, interpolates bus positions
function animateVehicles() {
  const now = Date.now();
  for (const [id, state] of Object.entries(vehicleStates)) {
    const m = markers[id];
    if (!m) continue;
    const raw = Math.min((now - state.updateTime) / 6000, 1);
    const t = 1 - Math.pow(1 - raw, 3); // cubic ease-out
    const lat = state.fromLat + (state.toLat - state.fromLat) * t;
    const lng = state.fromLng + (state.toLng - state.fromLng) * t;
    state.currentLat = lat;
    state.currentLng = lng;
    m.setLatLng([lat, lng]);
  }
  setTimeout(animateVehicles, 100);
}

function makePopupHtml(v, routeName, color) {
  const r = routes[v.route_id];
  const longName = r ? (r.route_long_name || '') : '';
  return `<div style="min-width:150px">
    <div class="popup-route" style="color:${color}">Line ${routeName}</div>
    ${longName ? `<div class="popup-label">${longName}</div>` : ''}
    <div class="popup-meta">
      Speed: <span>${v.speed != null ? Math.round(v.speed) + ' km/h' : '—'}</span><br>
      Heading: <span>${v.bearing != null ? Math.round(v.bearing) + '°' : '—'}</span><br>
      Vehicle: <span>${v.label || v.id || '—'}</span>
    </div>
  </div>`;
}

function updateList() {
  const fv = filteredVehicles();
  const list = document.getElementById('busList');
  if (fv.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div>
      <div class="empty-text">${vehicles.length > 0 ? 'No buses match filter' : 'No vehicles found.'}</div></div>`;
    return;
  }
  const sorted = [...fv].sort((a, b) => {
    const na = routes[a.route_id]?.route_short_name || '';
    const nb = routes[b.route_id]?.route_short_name || '';
    return na.localeCompare(nb, undefined, { numeric: true });
  });
  list.innerHTML = sorted.map(v => {
    const id = v.id;
    const r = routes[v.route_id];
    const routeName = r ? (r.route_short_name || r.route_long_name || '?') : String(v.route_id || '?');
    const longName = r ? (r.route_long_name || '') : '';
    const color = routeColor(routeName);
    const speed = v.speed != null ? Math.round(v.speed) + ' km/h' : '—';
    return `<div class="bus-item ${id == selectedId ? 'active' : ''}" onclick="selectBus('${id}')">
      <div class="bus-badge" style="background:${color}">${routeName}</div>
      <div class="bus-info">
        <div class="bus-label">${longName || v.label || 'Vehicle ' + id}</div>
        <div class="bus-meta">${v.latitude?.toFixed(4)}, ${v.longitude?.toFixed(4)}</div>
      </div>
      <div class="bus-speed">${speed}</div>
    </div>`;
  }).join('');
}

function selectBus(id) {
  // Tap same bus again → deselect and clear route
  if (selectedId === id) {
    selectedId = null;
    clearRouteLines();
    updateList();
    return;
  }
  selectedId = id;
  const m = markers[id]; if (!m) return;
  const v = m._vdata; const routeName = m._routeName; const color = routeColor(routeName);
  map.flyTo([v.latitude, v.longitude], 16, { duration: 0.8 });
  m.bindPopup(makePopupHtml(v, routeName, color), { maxWidth: 220 }).openPopup();
  drawRoute(v.route_id, color);
  updateList();
}

function applyFilter() {
  filterText = document.getElementById('routeFilter').value.trim();
  updateMap(); updateList();
}

function clearFilter() {
  document.getElementById('routeFilter').value = '';
  filterText = ''; updateMap(); updateList();
}

// ── MY LOCATION ──
let locationWatcher = null;
let locationMarker  = null;
let locationCircle  = null;
let deviceHeading   = null;
let locating        = false;

function makeLocationIcon(heading) {
  const hasHeading = heading !== null && heading !== undefined;
  const rot = hasHeading ? heading : 0;
  return L.divIcon({
    html: `<div style="position:relative;width:60px;height:60px;">
      ${hasHeading ? `<svg style="position:absolute;top:0;left:0;transform:rotate(${rot}deg);transform-origin:30px 30px;" width="60" height="60" viewBox="0 0 60 60">
        <path d="M30,30 L18,2 Q30,0 42,2 Z" fill="rgba(66,133,244,0.35)"/>
      </svg>` : ''}
      <div style="position:absolute;top:21px;left:21px;width:18px;height:18px;
        background:#4285f4;border:3px solid #fff;border-radius:50%;
        box-shadow:0 0 0 3px rgba(66,133,244,0.25),0 2px 8px rgba(0,0,0,0.4);">
      </div>
    </div>`,
    className: '', iconSize: [60, 60], iconAnchor: [30, 30]
  });
}

function updateLocationMarker(lat, lng, acc) {
  const icon = makeLocationIcon(deviceHeading);
  if (locationMarker) {
    locationMarker.setLatLng([lat, lng]);
    locationMarker.setIcon(icon);
    locationCircle.setLatLng([lat, lng]).setRadius(acc);
  } else {
    locationCircle = L.circle([lat, lng], {
      radius: acc, color: '#4285f4', fillColor: '#4285f4',
      fillOpacity: 0.08, weight: 1, opacity: 0.4
    }).addTo(map);
    locationMarker = L.marker([lat, lng], { icon, zIndexOffset: 1000 }).addTo(map);
  }
}

function onPosition(pos) {
  const { latitude: lat, longitude: lng, accuracy: acc, heading } = pos.coords;
  if (heading !== null) deviceHeading = heading;
  updateLocationMarker(lat, lng, acc);
}

function onOrientation(e) {
  const h = e.webkitCompassHeading ?? (e.alpha !== null ? (360 - e.alpha) : null);
  if (h !== null) { deviceHeading = h; if (locationMarker) locationMarker.setIcon(makeLocationIcon(h)); }
}

function startOrientation() {
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(p => {
      if (p === 'granted') window.addEventListener('deviceorientation', onOrientation);
    }).catch(() => {});
  } else {
    window.addEventListener('deviceorientation', onOrientation);
  }
}

function toggleLocate() {
  const btn = document.getElementById('locateBtn');
  if (locating) {
    // Stop
    if (locationWatcher) { navigator.geolocation.clearWatch(locationWatcher); locationWatcher = null; }
    if (locationMarker)  { map.removeLayer(locationMarker); locationMarker = null; }
    if (locationCircle)  { map.removeLayer(locationCircle); locationCircle = null; }
    window.removeEventListener('deviceorientation', onOrientation);
    btn.classList.remove('active');
    btn.textContent = '📍';
    locating = false;
  } else {
    if (!navigator.geolocation) { alert('GPS not available on this device.'); return; }
    btn.textContent = '⏳';
    navigator.geolocation.getCurrentPosition(pos => {
      onPosition(pos);
      map.flyTo([pos.coords.latitude, pos.coords.longitude], 16, { duration: 1 });
      locationWatcher = navigator.geolocation.watchPosition(onPosition, null, { enableHighAccuracy: true, maximumAge: 5000 });
      startOrientation();
      btn.classList.add('active');
      btn.textContent = '📍';
      locating = true;
    }, () => { btn.textContent = '📍'; alert('Could not get your location.'); });
  }
}

function setStatus(state, text) {
  document.getElementById('statusDot').className = 'status-dot' + (state === 'live' ? ' live' : state === 'error' ? ' error' : '');
  document.getElementById('statusText').textContent = text;
}

function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = msg; el.style.display = 'block';
}
function hideError() { document.getElementById('errorBanner').style.display = 'none'; }

connect();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
}
</script>
